<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <main class="container">
        <section class="app" aria-label="Todo app">
            <header class="app__header">
                <h1 class="app__title">Todo App</h1>
                <p class="app__subtitle">Add tasks, mark them complete, and delete them.</p>
            </header>

            <form id="todoForm" class="todo-form" autocomplete="off">
                <label class="todo-form__label" for="todoInput">Task</label>
                <div class="todo-form__row">
                    <input id="todoInput" name="todoInput" type="text" placeholder="e.g., Finish homework"
                        maxlength="120" required />
                    <button type="submit" class="btn btn--primary">Add</button>
                </div>
                <p class="todo-form__hint">Tip: press Enter to add a task.</p>
            </form>

            <div class="todo-list__wrapper">
                <p id="emptyState" class="empty-state">No tasks yet. Add one above!</p>
                <ul id="todoList" class="todo-list" aria-live="polite"></ul>
            </div>
        </section>
    </main>

    <script src="./script.js" defer></script>
</body>

</html>
